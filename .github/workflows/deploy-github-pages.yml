name: Deploy GitHub Pages

# Builds Portfolio.Web and publishes dist/ to the gh-pages branch.
# GitHub Pages must use: Settings → Pages → Deploy from a branch → gh-pages / / (root)
# Do NOT point Pages at main/development (that serves the README, not the SPA).

on:
  push:
    branches:
      - development
      - main
    paths:
      - 'src/Portfolio.Web/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Portfolio.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/Portfolio.Web
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: src/Portfolio.Web
        env:
          # Project site URL: https://<owner>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_STATIC_DEMO: 'true'
          VITE_ENABLE_INTERACTION_METRICS: 'false'
          VITE_USE_HOST_STATS_API: 'false'
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: SPA fallback for deep links
        working-directory: src/Portfolio.Web
        # GitHub Pages serves 404.html for unknown paths; copy index so client routing works.
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/Portfolio.Web/dist
          force_orphan: true
          # Avoid committing a redundant commit message footer from the action when empty
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
