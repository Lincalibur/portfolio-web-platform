name: Deploy GitHub Pages

# Publishes the static SPA (Portfolio.Web) only — ASP.NET API cannot run on GitHub Pages.
# After the first successful run: Settings → Pages → Source = GitHub Actions.

on:
  push:
    branches:
      - development
      - main
    paths:
      - 'src/Portfolio.Web/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Portfolio.Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Portfolio.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          # Project site URL: https://<owner>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_STATIC_DEMO: 'true'
          VITE_ENABLE_INTERACTION_METRICS: 'false'
          VITE_USE_HOST_STATS_API: 'false'
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: SPA fallback for deep links
        # GitHub Pages serves 404.html for unknown paths; copy index so client routing works.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/Portfolio.Web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
